<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>bmextd</title>
	<link rel="stylesheet" href="style.css">
</head>
<body class="popup-page">
	<div class="container">
		<header class="header">
			<h1 class="title">BookMarks</h1>
			<div class="header-actions">
				<button id="addFolderBtn" class="icon-btn" title="Add Folder" aria-label="Add Folder">
					<svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
						<path d="M4 6h6l2 2h8v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
						<path d="M12 11v6M9 14h6" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
					</svg>
				</button>
				<button id="favoritesToggleBtn" class="icon-btn" title="Show Favorites" aria-label="Show Favorites">
					<svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
						<path d="M12 3.5l2.6 5.1 5.6.8-4.1 4 1 5.6L12 16.2 7 19l1-5.6-4.1-4 5.6-.8L12 3.5z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
					</svg>
				</button>
					<button id="themeToggleBtn" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
						<svg viewBox="0 0 24 24" class="icon-svg icon-sun" aria-hidden="true">
							<circle cx="12" cy="12" r="4.5" fill="none" stroke="currentColor" stroke-width="1.8"/>
							<path d="M12 2.5v2.2M12 19.3v2.2M4.2 4.2l1.6 1.6M18.2 18.2l1.6 1.6M2.5 12h2.2M19.3 12h2.2M4.2 19.8l1.6-1.6M18.2 5.8l1.6-1.6" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
						</svg>
						<svg viewBox="0 0 24 24" class="icon-svg icon-moon hidden" aria-hidden="true">
							<path d="M16.7 14.8A7.2 7.2 0 0 1 9.2 7.3c0-1.1.2-2.2.7-3.2A8.5 8.5 0 1 0 19.9 15c-1-.4-2.1-.7-3.2-.7Z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
						</svg>
					</button>
				<button id="importBtn" class="icon-btn" title="Import" aria-label="Import">
					<svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
						<path d="M12 3v12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
						<path d="M8 11l4 4 4-4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
						<path d="M5 19h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
					</svg>
				</button>
				<button id="exportBtn" class="icon-btn" title="Export" aria-label="Export">
					<svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
						<path d="M12 21V9" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
						<path d="M8 13l4-4 4 4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
						<path d="M5 5h14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
					</svg>
				</button>
				<button id="searchToggleBtn" class="icon-btn" title="Search" aria-label="Search">
					<svg viewBox="0 0 24 24" class="icon-svg" aria-hidden="true">
						<circle cx="11" cy="11" r="6" fill="none" stroke="currentColor" stroke-width="1.8"/>
						<path d="M16 16l5 5" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
					</svg>
				</button>
			</div>
		</header>

		<div class="search-container hidden" id="searchContainer">
			<input 
				type="text" 
				id="searchInput" 
				class="search-input" 
				placeholder="Search bookmarks..."
			>
		</div>

		<!-- Main Content -->
		<main id="mainContent" class="main-content">
			<!-- Sections will be rendered here -->
		</main>

		<input type="file" id="importInput" accept=".html,.htm" style="display: none;">
	</div>

	<!-- Context Menu -->
	<div id="contextMenu" class="context-menu hidden">
		<div class="context-item" data-action="edit">Edit</div>
		<div class="context-item" data-action="delete">Delete</div>
		<div class="context-item" data-action="favorite">Toggle Favorite</div>
	</div>

	<!-- Modal for Add/Edit -->
	<div id="modal" class="modal hidden">
		<div class="modal-content">
			<h2 id="modalTitle" class="modal-title">Add Bookmark</h2>
			<form id="modalForm">
				<input type="hidden" id="modalSectionId">
				<input type="hidden" id="modalItemId">
        
				<label for="modalLabel">Label:</label>
				<input type="text" id="modalLabel" required class="modal-input">
        
				<label for="modalUrl">URL:</label>
				<input type="text" id="modalUrl" required class="modal-input" placeholder="example.com">
        
				<div class="modal-actions">
					<button type="submit" class="btn-primary">Save</button>
					<button type="button" id="modalCancel" class="btn-secondary">Cancel</button>
				</div>
			</form>
		</div>
	</div>

	<!-- Modal for Section -->
	<div id="sectionModal" class="modal hidden">
		<div class="modal-content">
			<h2 id="sectionModalTitle" class="modal-title">Add Folder</h2>
			<form id="sectionModalForm">
				<input type="hidden" id="sectionModalId">
        
				<label for="sectionModalName">Folder Name:</label>
				<input type="text" id="sectionModalName" required class="modal-input">
        
				<div class="modal-actions">
					<button type="submit" class="btn-primary">Save</button>
					<button type="button" id="sectionModalCancel" class="btn-secondary">Cancel</button>
				</div>
			</form>
		</div>
	</div>

	<script src="utils.js"></script>
	<script src="popup.js"></script>
</body>
</html>
